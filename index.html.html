<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emperor Management — Restaurant Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8C96A;--gold-dark:#8B6914;
  --obsidian:#0A0A0F;--obsidian-2:#12121A;--obsidian-3:#1A1A26;
  --obsidian-4:#22222F;--obsidian-5:#2A2A3A;
  --red-alert:#E84545;--orange-warn:#F5A623;--green-ok:#22C55E;
  --text-primary:#F0EDE4;--text-secondary:#9C98AA;--text-muted:#5A5870;
  --border:#2E2E42;--border-light:#3A3A50;
}
body{font-family:'DM Sans',sans-serif;background:var(--obsidian);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
 
.page{display:none;min-height:100vh}
.page.active{display:block}
 
/* NAV */
.landing-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,168,76,0.12),transparent),radial-gradient(ellipse 60% 40% at 80% 60%,rgba(201,168,76,0.06),transparent);pointer-events:none}
.nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 3rem;border-bottom:1px solid rgba(201,168,76,0.15);position:sticky;top:0;z-index:50;background:rgba(10,10,15,0.9);backdrop-filter:blur(12px)}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.nav-logo-text{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:var(--gold);letter-spacing:0.05em}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{color:var(--text-secondary);font-size:0.875rem;text-decoration:none;transition:color 0.2s}
.nav-links a:hover, .nav-links a.active{color:var(--gold)}
.nav-cta{background:var(--gold);color:var(--obsidian);font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.875rem;padding:0.5rem 1.25rem;border-radius:6px;border:none;cursor:pointer;transition:background 0.2s}
.nav-cta:hover{background:var(--gold-light)}
 
/* HERO */
.hero{padding:6rem 3rem 5rem;text-align:center;max-width:900px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:var(--gold);font-size:0.75rem;font-weight:500;letter-spacing:0.08em;padding:0.35rem 0.9rem;border-radius:100px;text-transform:uppercase;margin-bottom:1.5rem}
.hero h1{font-family:'Cinzel',serif;font-size:clamp(2.5rem,5vw,4rem);font-weight:900;line-height:1.1;margin-bottom:1.25rem;background:linear-gradient(180deg,#F0EDE4 0%,#C9A84C 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:var(--text-secondary);font-size:1.1rem;line-height:1.7;max-width:620px;margin:0 auto 2.5rem}
.hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--gold);color:var(--obsidian);font-family:'DM Sans',sans-serif;font-weight:700;font-size:1rem;padding:0.85rem 2rem;border-radius:8px;border:none;cursor:pointer;transition:all 0.2s;letter-spacing:0.02em}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,0.25)}
.btn-secondary{background:transparent;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-weight:500;font-size:1rem;padding:0.85rem 2rem;border-radius:8px;border:1px solid var(--border-light);cursor:pointer;transition:all 0.2s}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold)}
.stats-row{display:flex;justify-content:center;gap:3rem;padding:3rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:2rem 0;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-family:'Cinzel',serif;font-size:2rem;font-weight:700;color:var(--gold);display:block}
.stat-lbl{font-size:0.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:0.25rem}
 
/* FEATURES */
.features{padding:4rem 3rem;max-width:1100px;margin:0 auto}
.section-title{text-align:center;margin-bottom:3rem}
.section-title h2{font-family:'Cinzel',serif;font-size:2rem;font-weight:700;color:var(--text-primary);margin-bottom:0.5rem}
.section-title p{color:var(--text-secondary);font-size:0.95rem}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.25rem}
.feat-card{background:var(--obsidian-3);border:1px solid var(--border);border-radius:12px;padding:1.5rem;transition:all 0.25s;cursor:default}
.feat-card:hover{border-color:rgba(201,168,76,0.4);background:var(--obsidian-4);transform:translateY(-2px)}
.feat-icon{width:44px;height:44px;background:rgba(201,168,76,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;margin-bottom:1rem;border:1px solid rgba(201,168,76,0.2)}
.feat-card h3{font-size:0.95rem;font-weight:600;color:var(--text-primary);margin-bottom:0.5rem}
.feat-card p{font-size:0.82rem;color:var(--text-secondary);line-height:1.6}
 
/* PRICING */
.pricing{padding:4rem 3rem;max-width:1000px;margin:0 auto}
.pricing-toggle{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:2.5rem}
.toggle-label{font-size:0.875rem;color:var(--text-secondary);transition:color 0.2s}
.toggle-label.active{color:var(--gold)}
.pricing-switch{position:relative;width:48px;height:26px;background:var(--obsidian-5);border-radius:100px;cursor:pointer;border:1px solid var(--border-light);transition:background 0.2s}
.pricing-switch.yearly{background:var(--gold-dark)}
.pricing-switch-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform 0.2s}
.pricing-switch.yearly .pricing-switch-thumb{transform:translateX(22px)}
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.25rem}
.price-card{background:var(--obsidian-3);border:1px solid var(--border);border-radius:14px;padding:1.75rem;position:relative;transition:all 0.2s}
.price-card.featured{border-color:var(--gold);background:var(--obsidian-4)}
.price-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--obsidian);font-size:0.7rem;font-weight:700;padding:0.25rem 0.75rem;border-radius:100px;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap}
.price-name{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--text-primary);margin-bottom:0.5rem}
.price-amount{font-size:2.25rem;font-weight:700;color:var(--gold);line-height:1;margin:0.75rem 0 0.25rem}
.price-amount span{font-size:0.9rem;color:var(--text-muted);font-weight:400}
.price-period{font-size:0.75rem;color:var(--text-muted);margin-bottom:1.25rem}
.price-features{list-style:none;margin-bottom:1.5rem}
.price-features li{font-size:0.82rem;color:var(--text-secondary);padding:0.3rem 0;display:flex;align-items:center;gap:6px}
.price-features li::before{content:"✦";color:var(--gold);font-size:0.6rem}
.price-btn{width:100%;padding:0.65rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.875rem;cursor:pointer;transition:all 0.2s}
.price-btn.outlined{background:transparent;border:1px solid var(--border-light);color:var(--text-primary)}
.price-btn.outlined:hover{border-color:var(--gold);color:var(--gold)}
.price-btn.filled{background:var(--gold);border:none;color:var(--obsidian)}
.price-btn.filled:hover{background:var(--gold-light)}
 
/* ONBOARDING */
.onboard-container{display:flex;justify-content:center;align-items:center;padding:4rem 2rem;min-height:calc(100vh - 80px)}
.onboard-card{background:var(--obsidian-2);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:560px;box-shadow:0 20px 40px rgba(0,0,0,0.5)}
.onboard-header{text-align:center;margin-bottom:2rem}
.onboard-logo{font-family:'Cinzel',serif;font-size:1.25rem;color:var(--gold);font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:center;gap:8px}
.onboard-header h2{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:700;margin-bottom:0.5rem}
.onboard-header p{font-size:0.875rem;color:var(--text-secondary)}
.step-indicator{display:flex;align-items:center;justify-content:center;gap:0.75rem;margin-bottom:2.5rem}
.step-dot{width:32px;height:32px;border-radius:50%;border:1px solid var(--border-light);background:var(--obsidian-3);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:600;color:var(--text-muted);transition:all 0.3s}
.step-dot.active{background:var(--gold);color:var(--obsidian);border-color:var(--gold);box-shadow:0 0 15px rgba(201,168,76,0.3)}
.step-dot.completed{background:var(--obsidian-5);color:var(--green-ok);border-color:var(--green-ok)}

/* FORM ELEMENTS */
.form-group{margin-bottom:1.5rem;text-align:left}
.form-group label{display:block;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-secondary);margin-bottom:0.5rem}
.form-control{width:100%;background:var(--obsidian-3);border:1px solid var(--border);border-radius:8px;padding:0.85rem 1rem;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:0.95rem;transition:border-color 0.2s}
.form-control:focus{outline:none;border-color:var(--gold)}
.onboard-step{display:none}
.onboard-step.active{display:block}
.onboard-footer{display:flex;justify-content:space-between;gap:1rem;margin-top:2rem}
</style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="nav">
    <div class="nav-logo" onclick="showPage('home')">
      <div class="nav-logo-text">Emperor Management</div>
    </div>
    <ul class="nav-links">
      <li><a href="#" id="link-home" onclick="showPage('home')" class="active">Overview</a></li>
      <li><a href="#" id="link-features" onclick="showPage('features-page')">Features</a></li>
      <li><a href="#" id="link-pricing" onclick="showPage('pricing-page')">Pricing</a></li>
    </ul>
